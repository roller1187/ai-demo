apiVersion: apps/v1
kind: Deployment
metadata:
  name: quarkus-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quarkus-frontend
  template:
    metadata:
      labels:
        app: quarkus-frontend
    spec:
      containers:
      - name: quarkus-frontend
        image: image-registry.openshift-image-registry.svc:5000/ai-demo/quarkus-frontend:latest
        ports:
        - containerPort: 8080
        env:
        - name: QUARKUS_REST_CLIENT_DETECTION_API_URL
          value: "http://python-ai-service:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: quarkus-frontend
spec:
  selector:
    app: quarkus-frontend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: scanner-ui
spec:
  to:
    kind: Service
    name: quarkus-frontend
  port:
    targetPort: 8080
